<!-- Template: Experiment 6 – Node.js + Express -->
<div class="experiment-page">
    <h2>Experiment 6: {{title}}</h2>

    <table class="info-table">
        <tr>
            <td><strong>Name:</strong> {{name}}</td>
            <td style="text-align:right;"><strong>Roll No:</strong> {{rollno}}</td>
        </tr>
        <tr>
            <td colspan="2"><strong>Date:</strong> {{date}}</td>
        </tr>
    </table>

    <h3>Code</h3>
    <pre><code>{{code}}</code></pre>

    <h3>Output</h3>
    <pre style="font-family:'Courier New',Courier,monospace; font-size:10px; padding:8px; border:1px solid #ccc; background:#fff; color:#000; white-space:pre-wrap;">Processing user...
Hello {{name}}
Start
End
Server running on http://localhost:3000
This runs after 2 seconds (Event Loop)</pre>
</div>
