<!-- Template: Experiment 5 – React.js Basics -->
<div class="experiment-page">
    <h2>Experiment 5: {{title}}</h2>

    <table class="info-table">
        <tr>
            <td><strong>Name:</strong> {{name}}</td>
            <td style="text-align:right;"><strong>Roll No:</strong> {{rollno}}</td>
        </tr>
        <tr>
            <td colspan="2"><strong>Date:</strong> {{date}}</td>
        </tr>
    </table>

    <h3>Code</h3>
    <pre><code>{{code}}</code></pre>

    <h3>Output</h3>
    <div class="output-img-wrap">
        <img src="{{screenshotPath}}" alt="Output Screenshot">
    </div>
</div>
