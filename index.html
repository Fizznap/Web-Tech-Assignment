<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Lab Report Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --accent: #ec4899;
            --bg-dark: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            background: radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.15) 0%, transparent 50%);
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            position: relative;
            z-index: 10;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-align: center;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #e2e8f0;
            letter-spacing: 0.5px;
        }

        input[type="text"], input[type="date"], input[type="file"] {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            padding: 14px 16px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, input[type="date"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        
        .experiments-section {
            background: rgba(15, 23, 42, 0.4);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid var(--glass-border);
        }

        .experiments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .toggle-all {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: color 0.2s;
        }

        .toggle-all:hover {
            color: #818cf8;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 0.95rem;
            color: #cbd5e1;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        
        .checkbox-label:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .checkbox-label input {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        .btn-generate {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 1.2rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
            box-shadow: 0 10px 20px -5px rgba(236, 72, 153, 0.4);
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(236, 72, 153, 0.6);
        }

        .btn-generate:active {
            transform: translateY(1px);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-text {
            font-size: 1.3rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            color: white;
            margin-bottom: 10px;
        }

        .success-container {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .success-container.active {
            display: flex;
        }

        .btn-download {
            background: #10b981;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 20px;
            transition: background 0.3s;
            display: inline-block;
        }

        .btn-download:hover {
            background: #059669;
        }
        
        .pulse {
            animation: pulse-glow 2s infinite;
        }
        
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AI Lab Report</h1>
        <p class="subtitle">Automated, production-ready Web Technology reports</p>

        <form id="generateForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Student Name *</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="rollno">Roll Number *</label>
                    <input type="text" id="rollno" name="rollno" required placeholder="CS24001">
                </div>
                <div class="form-group">
                    <label for="date">Date *</label>
                    <input type="date" id="date" name="date" required>
                </div>
            </div>

            <div class="experiments-section">
                <div class="experiments-header">
                    <label style="margin: 0; font-size: 1rem;">Select Experiments</label>
                    <button type="button" class="toggle-all" id="toggleAll">Deselect All</button>
                </div>
                <div class="checkbox-grid">
                    <label class="checkbox-label"><input type="checkbox" name="experiments" value="1" checked> Exp 1: HTML Basics</label>
                    <label class="checkbox-label"><input type="checkbox" name="experiments" value="2" checked> Exp 2: CSS Styling</label>
                    <label class="checkbox-label"><input type="checkbox" name="experiments" value="3" checked> Exp 3: JavaScript</label>
                    <label class="checkbox-label"><input type="checkbox" name="experiments" value="4" checked> Exp 4: React.js</label>
                    <label class="checkbox-label"><input type="checkbox" name="experiments" value="5" checked> Exp 5: Node.js Express</label>
                    <label class="checkbox-label"><input type="checkbox" name="experiments" value="6" checked> Exp 6: REST API</label>
                    <label class="checkbox-label"><input type="checkbox" name="experiments" value="7" checked> Exp 7: Full Stack</label>
                </div>
            </div>

            <button type="submit" class="btn-generate">Generate Lab Report</button>
        </form>
    </div>

    <div class="overlay" id="overlay">
        <div id="loadingState">
            <div class="spinner"></div>
            <div class="status-text" id="statusText">Initializing magic...</div>
        </div>
        <div class="success-container" id="successState">
            <div style="font-size: 4rem; margin-bottom: 20px;">✅</div>
            <h2 style="margin: 0; color: white;">Generation Complete!</h2>
            <p style="color: #cbd5e1;">Your custom lab report is ready.</p>
            <a href="#" id="downloadBtn" target="_blank" class="btn-download pulse">Download Lab Report PDF</a>
            <button type="button" onclick="closeOverlay()" style="margin-top: 15px; background: none; border: none; color: #94a3b8; cursor: pointer; text-decoration: underline;">Create another</button>
        </div>
    </div>

    <script>
        document.getElementById('date').valueAsDate = new Date();

        const toggleAllBtn = document.getElementById('toggleAll');
        const checkboxes = document.querySelectorAll('input[name="experiments"]');
        let allChecked = true;

        toggleAllBtn.addEventListener('click', () => {
            allChecked = !allChecked;
            checkboxes.forEach(cb => cb.checked = allChecked);
            toggleAllBtn.textContent = allChecked ? "Deselect All" : "Select All";
        });

        const form = document.getElementById('generateForm');
        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('statusText');
        const loadingState = document.getElementById('loadingState');
        const successState = document.getElementById('successState');
        const downloadBtn = document.getElementById('downloadBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const selectedExps = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
            if (selectedExps.length === 0) {
                alert("Please select at least one experiment.");
                return;
            }

            overlay.classList.add('active');
            loadingState.style.display = 'block';
            successState.classList.remove('active');
            
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            data.experiments = selectedExps;
            
            try {
                const progressTexts = [
                    "Analyzing context & references...",
                    "Invoking Claude AI for Generation...",
                    "Structuring formal experiment theory...",
                    "Creating brilliant code blocks...",
                    "Rendering realistic screenshots...",
                    "Compiling final HTML...",
                    "Brewing your PDF Report..."
                ];
                
                let pIndex = 0;
                const pInterval = setInterval(() => {
                    if(pIndex < progressTexts.length) {
                        statusText.textContent = progressTexts[pIndex++];
                    }
                }, 4000);

                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                clearInterval(pInterval);

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || "Generation failed.");
                }

                const result = await response.json();
                
                if (result.success) {
                    loadingState.style.display = 'none';
                    successState.classList.add('active');
                    downloadBtn.href = result.downloadUrl;
                } else {
                    throw new Error("Unknown error during generation.");
                }

            } catch (error) {
                alert("Error: " + error.message);
                closeOverlay();
            }
        });

        function closeOverlay() {
            overlay.classList.remove('active');
        }
    </script>
</body>
</html>
